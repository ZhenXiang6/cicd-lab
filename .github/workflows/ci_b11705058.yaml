name: CI - b11705058

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Checks (typecheck / prettier / test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier format check
        run: npm run format:check

      - name: Run unit tests (vitest with JUnit reporter)
        run: |
          mkdir -p reports
          npm test -- \
            --reporter=default \
            --reporter=junit \
            --outputFile.junit=reports/vitest-junit.xml

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-test-report
          path: reports/
          if-no-files-found: error

      - name: Publish test summary
        if: always()
        run: |
          {
            echo '## Vitest Test Summary'
            echo ''
            if [ -f reports/vitest-junit.xml ]; then
              TESTS=$(grep -oE 'tests="[0-9]+"' reports/vitest-junit.xml | head -1 | grep -oE '[0-9]+')
              FAILURES=$(grep -oE 'failures="[0-9]+"' reports/vitest-junit.xml | head -1 | grep -oE '[0-9]+')
              ERRORS=$(grep -oE 'errors="[0-9]+"' reports/vitest-junit.xml | head -1 | grep -oE '[0-9]+')
              SKIPPED=$(grep -oE 'skipped="[0-9]+"' reports/vitest-junit.xml | head -1 | grep -oE '[0-9]+')
              echo "| Metric | Count |"
              echo "| --- | --- |"
              echo "| Total | ${TESTS:-0} |"
              echo "| Failures | ${FAILURES:-0} |"
              echo "| Errors | ${ERRORS:-0} |"
              echo "| Skipped | ${SKIPPED:-0} |"
            else
              echo 'No JUnit report found.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
